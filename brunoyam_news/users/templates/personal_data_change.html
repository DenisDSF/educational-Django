{% extends 'base.html' %}
{% load static %}
{% block title %}Личный кабинет{% endblock %}
{% block cart %}{% endblock %}
{% block header %}Личный кабинет{% endblock %}
{% block content %}
<div class="row">
  <div class="col-sm-3 col-1"></div>
  <div class="col-sm-6 col-10 login">
    <div class="login-form">
      <form method="POST" action="{% url 'personal_data_change' %}">
        {% csrf_token %}
        <div class="mb-3">
          <label for="usernameInput" class="form-label">Имя:</label>
          <input name="name" type="text" class="form-control"
                 id="usernameInput"
                 value='{{ user.name|default_if_none:"" }}'>
        </div>
        <div class="mb-3">
          <label for="surname" class="form-label">Фамилия:</label>
          <input name="surname" type="text" class="form-control"
                 id="surname" value='{{ user.surname|default_if_none:"" }}'>
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Почта:</label>
          <input name="email" type="email" class="form-control"
                 id="email" value="{{ user.email }}">
        </div>
        <div class="form-fields-error">
          {% for f in form %}
            <div class="field-error">
              <p>{{ f.errors }}</p>
            </div>
          {% endfor %}
        </div>
        <button type="submit" class="btn btn-dark">Изменить</button>
      </form>
    </div>
  </div>
  <div class="col-sm-3 col-1"></div>
</div>
{% endblock %}
